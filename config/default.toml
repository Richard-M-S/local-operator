[server]
host = "0.0.0.0"
port = 8080

[database]
url = "sqlite://operator.db"

[docker]
enabled = true

[homeassistant]
enabled = true
base_url = "http://homeassistant.local:8123"
token_env = "HA_TOKEN"
timeout_seconds = 10

[policy]
allow_tier1_without_confirm = true
allow_tier2_without_confirm = false
block_tier3 = true

[llm]
enabled = true
provider = "ollama"
base_url = "http://localhost:11434"
model = "qwen2.5:14b"
timeout_seconds = 60