[server]
host = "0.0.0.0"
port = 8080

[auth]
enabled = false
token_env = "OPERATOR_API_TOKEN"

[database]
url = "sqlite:///opt/local-operator/data/operator.db"

[docker]
enabled = true

[homeassistant]
enabled = true
base_url = "http://localhost:8123"
token_env = "HA_TOKEN"
timeout_seconds = 10

[policy]
allow_tier1_without_confirm = false
allow_tier2_without_confirm = false
block_tier3 = true

[llm]
enabled = true
provider = "ollama"
base_url = "http://localhost:11434"
model = "qwen2.5:14b"
timeout_seconds = 120

[llm_router]
fast_model = "qwen2.5:7b"
default_model = "qwen2.5:14b"
coder_model = "qwen2.5-coder:14b"
deep_model = "qwen2.5:32b"
task_summary_model = "qwen2.5:7b"
task_extraction_model = "qwen2.5:14b"
task_reasoning_model = "qwen2.5:32b"
task_writing_model = "qwen2.5:14b"
